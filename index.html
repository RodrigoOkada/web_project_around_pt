<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="EUA Afora" />
    <meta name="keywords" content="photos, social media" />
    <meta name="author" content="Rodrigo Okada" />
    <link rel="stylesheet" href="./pages/index.css" />
    <title>Around</title>
  </head>
  <body class="page">
    <header class="header">
      <img src="./images/logo.png" class="header__logo" alt="logo" />
      <hr class="header__line" />
    </header>

    <main class="content">
      <section class="profile">
        <img
          src="./images/profile-image.jpg"
          class="profile__image"
          alt="avatar"
        />
        <div class="profile__info">
          <div class="profile__info-header">
            <h1 class="profile__info-name">Jacques Cousteau</h1>
            <button class="profile__info-edit">
              <img
                class="profile__info-edit-image"
                src="./images/edit-image.png"
                alt="edit image"
              />
            </button>
          </div>
          <p class="profile__info-description">Explorador</p>
        </div>
        <button class="profile__info-add">
          <img
            class="profile__info-add-image"
            src="./images/add-image.png"
            alt="add image"
          />
        </button>
      </section>

      <section class="cards">
        <ul class="cards__list"></ul>
      </section>
    </main>
    <footer class="footer">
      <p class="footer__copyright">&copy; 2025 Around The U.S.</p>
    </footer>

    <div class="popup-profile popup">
      <div class="popup__content">
        <button class="popup__button-close">
          <img
            class="popup__button-close-image"
            src="./images/Close.png"
            alt="close button"
          />
        </button>
        <h3 class="popup__title">Editar Perfil</h3>
        <form class="popup__form form popup__form-person">
          <label class="popup__form-label"
            ><input
              class="popup__form-input popup__form-input-name"
              placeholder="Seu nome"
          /></label>
          <label class="popup__form-label"
            ><input
              class="popup__form-input popup__form-input-profession"
              placeholder="Sua profissão"
          /></label>
          <button type="submit" class="popup__form-button">Salvar</button>
        </form>
      </div>
    </div>

    <div class="popup-newlocal popup">
      <div class="popup__content">
        <button class="popup__button-close">
          <img
            class="popup__button-close-image"
            src="./images/Close.png"
            alt="close button"
          />
        </button>
        <h3 class="popup__title">Novo Local</h3>
        <form class="popup__form form popup__form-local">
          <label class="popup__form-label"
            ><input
              class="popup__form-input popup__form-input-title"
              placeholder="Título"
              required
          /></label>
          <label class="popup__form-label"
            ><input
              class="popup__form-input popup__form-input-link"
              placeholder="Link da imagem"
              type="url"
              required
          /></label>
          <button type="submit" class="popup__form-button">Criar</button>
        </form>
      </div>
    </div>

    <div class="popup__image popup">
      <div class="popup__container">
        <button class="popup__button-close">
          <img
            class="popup__button-close-image"
            src="./images/Close.png"
            alt="close button"
          />
        </button>
        <img src="" class="popup__image-enlarge" alt="" />
        <p class="popup__image-title"></p>
      </div>
    </div>

    <template id="card-template">
      <li class="card">
        <img src="" class="card__image" alt="" />
        <img src="./images/Trash.png" class="card__trash" alt="lixeira" />
        <div class="card__footer">
          <p class="card__title"></p>
          <button class="card__button-like">
            <img
              src="./images/Like.png"
              class="card__like-icon"
              alt="Like icon"
            />
          </button>
        </div>
      </li>
    </template>
  </body>
  <script src="./scripts/index.js"></script>
</html>
